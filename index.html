<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 나의 소풍 유형은? | Seoul Summer Outing 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f5e9 0%, #fdf8f0 60%, #fff9e6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 520px; }

    /* ══ INTRO ══ */
    #intro {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.10);
      overflow: hidden;
      animation: fadeUp .6s ease;
    }

    .intro-hero {
      background: linear-gradient(135deg, #3fa52b 0%, #8dd44a 100%);
      padding: 44px 32px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .intro-hero::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,.10);
      top: -70px; right: -60px;
    }
    .intro-hero::after {
      content: '';
      position: absolute;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      bottom: -40px; left: -40px;
    }

    .intro-badge {
      display: inline-block;
      background: rgba(255,255,255,.22);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .intro-hero h1 {
      color: #fff;
      font-size: 26px;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .intro-hero p {
      color: rgba(255,255,255,.88);
      font-size: 13.5px;
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .intro-body { padding: 28px; }

    .types-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 24px;
    }
    .type-pill {
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .pill-a { background: #fff8e1; color: #b45309; }
    .pill-b { background: #e8f5e9; color: #166534; }
    .pill-c { background: #f3e8ff; color: #6d28d9; }
    .pill-d { background: #fce7f3; color: #9d174d; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #3fa52b, #8dd44a);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: .3px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 18px rgba(63,165,43,.30);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(63,165,43,.38); }
    .start-btn:active { transform: translateY(0); }
    .intro-note { margin-top: 13px; font-size: 12px; color: #9ca3af; text-align: center; }

    /* ══ QUIZ ══ */
    #quiz { display: none; animation: fadeUp .45s ease; }

    .quiz-header {
      background: #fff;
      border-radius: 18px;
      padding: 18px 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      margin-bottom: 14px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
      font-size: 12.5px;
      font-weight: 700;
      color: #6b7280;
    }
    .progress-bar { height: 7px; background: #e5e7eb; border-radius: 8px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3fa52b, #8dd44a);
      border-radius: 8px;
      transition: width .45s ease;
    }

    .question-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 36px rgba(0,0,0,.09);
      overflow: hidden;
    }

    .question-top {
      background: linear-gradient(135deg, #3fa52b 0%, #8dd44a 100%);
      padding: 26px 26px 22px;
    }
    .q-intro {
      font-size: 12px;
      color: rgba(255,255,255,.75);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: .3px;
    }
    .q-text {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      line-height: 1.45;
    }

    /* Binary option cards */
    .options-binary {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .option-card {
      width: 100%;
      padding: 18px 20px;
      background: #f8faf8;
      border: 2.5px solid #e5e7eb;
      border-radius: 16px;
      text-align: left;
      cursor: pointer;
      transition: all .22s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .option-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: #e5e7eb;
      border-radius: 4px 0 0 4px;
      transition: background .22s;
    }
    .opt-mark {
      min-width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #9ca3af;
      flex-shrink: 0;
      transition: all .22s;
    }
    .opt-text {
      font-size: 14.5px;
      font-weight: 600;
      color: #374151;
      line-height: 1.5;
    }

    .option-card:hover {
      border-color: #3fa52b;
      background: #f0fdf4;
      transform: translateX(4px);
    }
    .option-card:hover::before { background: #3fa52b; }
    .option-card:hover .opt-mark { background: #3fa52b; color: #fff; }

    .option-card.selected {
      border-color: #3fa52b;
      background: #f0fdf4;
    }
    .option-card.selected::before { background: #3fa52b; }
    .option-card.selected .opt-mark { background: #3fa52b; color: #fff; }

    /* ══ RESULT ══ */
    #result { display: none; animation: fadeUp .6s ease; }

    .result-card {
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.14);
    }

    .result-hero {
      padding: 38px 28px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .result-hero::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,.11);
      top: -80px; right: -60px;
    }
    .result-hero::after {
      content: '';
      position: absolute;
      width: 150px; height: 150px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      bottom: -40px; left: -50px;
    }

    .res-badge {
      display: inline-block;
      background: rgba(255,255,255,.23);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .res-illust {
      width: 136px; height: 136px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }

    .res-type-name {
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 9px;
      position: relative;
      z-index: 1;
    }
    .res-slogan {
      color: rgba(255,255,255,.88);
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* Axis meter */
    .axis-bar-wrap {
      background: rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }
    .axis-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .axis-row:last-child { margin-bottom: 0; }
    .axis-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.85); min-width: 52px; }
    .axis-track { flex: 1; height: 7px; background: rgba(255,255,255,.25); border-radius: 10px; overflow: hidden; }
    .axis-fill { height: 100%; background: #fff; border-radius: 10px; transition: width .8s ease .3s; }

    .result-body { background: #fff; padding: 26px 26px 28px; }

    .res-desc {
      font-size: 14.5px;
      color: #374151;
      line-height: 1.9;
      margin-bottom: 18px;
    }

    .res-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
    .res-tag { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; }

    .res-compat {
      background: #f9fafb;
      border-radius: 14px;
      padding: 15px 17px;
      margin-bottom: 20px;
    }
    .res-compat h4 {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 9px;
      letter-spacing: .5px;
    }
    .compat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .compat-chip { font-size: 13px; padding: 6px 13px; border-radius: 10px; font-weight: 600; }

    /* stats block */
    .stats-block {
      background: #f9fafb;
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .stats-header h4 { font-size: 13px; font-weight: 700; color: #6b7280; letter-spacing: .5px; }
    .stats-total { font-size: 12px; font-weight: 600; color: #9ca3af; }
    .stats-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .stats-row:last-child { margin-bottom: 0; }
    .stats-label { font-size: 12.5px; font-weight: 600; color: #374151; min-width: 108px; white-space: nowrap; }
    .stats-bar-wrap { flex: 1; height: 8px; background: #e5e7eb; border-radius: 8px; overflow: hidden; }
    .stats-bar { height: 100%; border-radius: 8px; transition: width 1s ease .2s; }
    .stats-pct { font-size: 12px; font-weight: 700; color: #6b7280; min-width: 32px; text-align: right; }
    .stats-row.mine .stats-label { color: #111827; font-weight: 800; }
    .stats-row.mine .stats-pct { color: #111827; font-weight: 800; }
    .stats-mine-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 8px; background: #374151; color: #fff;
      margin-left: 4px; vertical-align: middle;
    }
    .stats-loading { text-align: center; font-size: 13px; color: #9ca3af; padding: 8px 0; }

    /* name input */
    .name-input-wrap { margin-bottom: 12px; }
    .name-input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 13px;
      font-size: 14.5px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #374151;
      outline: none;
      transition: border-color .2s;
    }
    .name-input:focus { border-color: #3fa52b; }

    /* submit btn */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3fa52b, #8dd44a);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity .2s;
    }
    .submit-btn:disabled { opacity: .5; cursor: default; }
    .submit-btn.done { background: #e5e7eb; color: #6b7280; }

    .retry-btn {
      width: 100%;
      padding: 14px;
      background: #f3f4f6;
      color: #374151;
      font-size: 14.5px;
      font-weight: 700;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      transition: background .2s;
    }
    .retry-btn:hover { background: #e5e7eb; }

    /* ══ COLORS ══ */
    .bg-a { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }
    .bg-b { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
    .bg-c { background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%); }
    .bg-d { background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%); }

    .tag-a { background: #fef3c7; color: #b45309; }
    .tag-b { background: #d1fae5; color: #065f46; }
    .tag-c { background: #ede9fe; color: #5b21b6; }
    .tag-d { background: #fce7f3; color: #9d174d; }

    .chip-a { background: #fef3c7; color: #92400e; }
    .chip-b { background: #d1fae5; color: #064e3b; }
    .chip-c { background: #ede9fe; color: #4c1d95; }
    .chip-d { background: #fce7f3; color: #831843; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ════ INTRO ════ -->
  <div id="intro">
    <div class="intro-hero">
      <div class="intro-badge">SEOUL SUMMER OUTING 2026</div>
      <h1>나의 소풍 유형은<br>무엇일까요? 🌿</h1>
      <p style="margin-top:10px">6개의 질문으로 알아보는<br>나만의 피크닉 스타일</p>
    </div>
    <div class="intro-body">
      <p style="font-size:13px;color:#6b7280;margin-bottom:16px;text-align:center">
        당신은 총 4가지 유형 중 어디에 해당할까요?
      </p>
      <div class="types-grid">
        <div class="type-pill pill-a">☀️ 도시락 준비왕</div>
        <div class="type-pill pill-b">🌿 자연 탐구형</div>
        <div class="type-pill pill-c">🌸 감성파 피크니커</div>
        <div class="type-pill pill-d">🦋 꽃밭 소셜 나비</div>
      </div>
      <div class="name-input-wrap">
        <input type="text" id="user-name" class="name-input" placeholder="이름을 입력해주세요 (ex. 홍길동)" maxlength="20" />
      </div>
      <button class="start-btn" onclick="startQuiz()">테스트 시작하기 →</button>
      <p class="intro-note">소요 시간 약 2분 · 6문항</p>
    </div>
  </div>

  <!-- ════ QUIZ ════ -->
  <div id="quiz">
    <div class="quiz-header">
      <div class="progress-meta">
        <span id="q-counter">1 / 6</span>
        <span id="q-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-top">
        <div class="q-intro" id="q-intro"></div>
        <div class="q-text" id="q-text"></div>
      </div>
      <div class="options-binary" id="opts"></div>
    </div>
  </div>

  <!-- ════ RESULT ════ -->
  <div id="result">
    <div class="result-card">
      <div class="result-hero" id="res-hero">
        <div class="res-badge">나의 소풍 유형</div>
        <div class="res-illust" id="res-illust"></div>
        <div class="res-type-name" id="res-name"></div>
        <div class="res-slogan" id="res-slogan"></div>
        <div class="axis-bar-wrap">
          <div class="axis-row">
            <span class="axis-label" id="ax1-label-l"></span>
            <div class="axis-track">
              <div class="axis-fill" id="ax1-fill" style="width:0%"></div>
            </div>
            <span class="axis-label" style="text-align:right" id="ax1-label-r"></span>
          </div>
          <div class="axis-row">
            <span class="axis-label" id="ax2-label-l"></span>
            <div class="axis-track">
              <div class="axis-fill" id="ax2-fill" style="width:0%"></div>
            </div>
            <span class="axis-label" style="text-align:right" id="ax2-label-r"></span>
          </div>
        </div>
      </div>
      <div class="result-body">
        <p class="res-desc" id="res-desc"></p>
        <div class="res-tags" id="res-tags"></div>
        <div class="res-compat">
          <h4>✨ 어울리는 소풍 파트너</h4>
          <div class="compat-chips" id="res-compat"></div>
        </div>
        <div class="stats-block" id="stats-block">
          <div class="stats-header">
            <h4>📊 우리 팀 소풍 유형 분포</h4>
            <span class="stats-total" id="stats-total"></span>
          </div>
          <div id="stats-rows"><div class="stats-loading">집계 중…</div></div>
        </div>
        <div id="submit-area">
          <button class="submit-btn" id="submit-btn" onclick="submitResult()">✓ 결과 제출하기</button>
        </div>
        <button class="retry-btn" onclick="restartQuiz()">↩ 다시 테스트하기</button>
      </div>
    </div>
  </div>

  <!-- ════ ADMIN ════ -->
  <div id="admin" style="display:none">
    <div style="background:#fff;border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.10);overflow:hidden">
      <div style="background:linear-gradient(135deg,#1e293b,#334155);padding:24px 24px 20px">
        <div style="font-size:11px;color:rgba(255,255,255,.6);letter-spacing:2px;font-weight:700;margin-bottom:6px">ADMIN</div>
        <div style="color:#fff;font-size:20px;font-weight:900">응답 수집 현황</div>
        <div style="color:rgba(255,255,255,.65);font-size:13px;margin-top:4px" id="admin-meta"></div>
      </div>
      <div style="padding:20px">
        <div id="admin-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px"></div>
        <div style="overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb">
          <table id="admin-table" style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr style="background:#f9fafb">
                <th style="padding:10px 14px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb">#</th>
                <th style="padding:10px 14px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb">이름</th>
                <th style="padding:10px 14px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb">유형</th>
                <th style="padding:10px 14px;text-align:left;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb">시각</th>
              </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
          </table>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button onclick="exportCSV()" style="flex:1;padding:12px;background:#1e293b;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer">↓ CSV 다운로드</button>
          <button onclick="clearData()" style="padding:12px 16px;background:#fee2e2;color:#b91c1c;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer">삭제</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
/*
  2축 MBTI 방식
  ─────────────────────────────────────────
  V축: 감성·개인 취향(V1) vs 그룹·실용(V2)   Q1·Q2·Q3
  E축: 액티브·즉흥(E1)   vs 여유·안정(E2)    Q4·Q5·Q6

  조합 → 유형
  V1 + E1 = 자연 탐구형   (b)
  V1 + E2 = 감성파 피크니커    (c)
  V2 + E1 = 꽃밭 소셜 나비    (d)
  V2 + E2 = 도시락 준비왕  (a)
*/

const QS = [
  {
    intro: "소풍 장소 물색 중 💭",
    text: "소풍 장소를 고를 때 나에게 더 중요한 건?",
    opts: [
      { text: "탁 트인 뷰와 감성적인 분위기", axis: 'V', val: 1 },
      { text: "주변 먹거리와 구경할 거리", axis: 'V', val: 2 }
    ]
  },
  {
    intro: "짐 싸는 중 🎒",

/* ════════════════════════════════
   설정: 웹훅 URL이 있으면 응답을 전송합니다.
   없으면 localStorage에만 저장됩니다.
   n8n, Google Apps Script 등 POST 웹훅 URL을 입력하세요.
   ════════════════════════════════ */
const CONFIG = {
  webhookUrl: '',   // n8n POST 웹훅 URL (결과 제출)
  statsUrl:    '',  // n8n GET 웹훅 URL (통계 조회) → { total, counts: {a,b,c,d} } 반환
  storageKey: 'picnic_results_2025'
};

/* ── State ── */
let vScore = [0, 0]; // [V1, V2]
let eScore = [0, 0]; // [E1, E2]
let cur = 0;
let userName = '';
let currentResultKey = null;

/* ── Admin page routing ── */
function route() {
  if (location.hash === '#admin') {
    showAdmin();
  } else {
    document.getElementById('intro').style.display = 'block';
  }
}
window.addEventListener('hashchange', route);
route();

function showAdmin() {
  ['intro','quiz','result'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('admin').style.display = 'block';
  renderAdmin();
}

function startQuiz() {
  const nameEl = document.getElementById('user-name');
  userName = nameEl.value.trim();
  if (!userName) {
    nameEl.style.borderColor = '#ef4444';
    nameEl.placeholder = '이름을 입력해주세요!';
    nameEl.focus();
    return;
  }
  nameEl.style.borderColor = '';
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = QS[cur];
  const total = QS.length;
  const pct = Math.round((cur / total) * 100);

  document.getElementById('q-counter').textContent = `${cur + 1} / ${total}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-intro').textContent = q.intro;
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-card';
    btn.innerHTML = `<span class="opt-mark">${i === 0 ? 'A' : 'B'}</span><span class="opt-text">${opt.text}</span>`;
    btn.onclick = () => pick(opt, btn);
    container.appendChild(btn);
  });
}

function pick(opt, btn) {
  document.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (opt.axis === 'V') vScore[opt.val - 1]++;
  else                   eScore[opt.val - 1]++;

  setTimeout(() => {
    cur++;
    if (cur < QS.length) renderQ();
    else showResult();
  }, 320);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  // Determine type
  const v = vScore[0] >= vScore[1] ? 1 : 2;
  const e = eScore[0] >= eScore[1] ? 1 : 2;
  let key;
  if      (v === 1 && e === 1) key = 'b';
  else if (v === 1 && e === 2) key = 'c';
  else if (v === 2 && e === 1) key = 'd';
  else                          key = 'a';

  const t = TYPES[key];

  document.getElementById('res-hero').className = 'result-hero ' + t.bgClass;
  document.getElementById('res-illust').innerHTML = t.svg;
  document.getElementById('res-name').textContent = t.name;
  document.getElementById('res-slogan').textContent = t.slogan;
  document.getElementById('res-desc').textContent = t.desc;

  const vPct = Math.round((vScore[0] / (vScore[0] + vScore[1])) * 100);
  const ePct = Math.round((eScore[0] / (eScore[0] + eScore[1])) * 100);
  document.getElementById('ax1-label-l').textContent = '감성취향';
  document.getElementById('ax1-label-r').textContent = '그룹실용';
  document.getElementById('ax2-label-l').textContent = '액티브';
  document.getElementById('ax2-label-r').textContent = '여유안정';
  setTimeout(() => {
    document.getElementById('ax1-fill').style.width = vPct + '%';
    document.getElementById('ax2-fill').style.width = ePct + '%';
  }, 100);

  const tagsEl = document.getElementById('res-tags');
  tagsEl.innerHTML = '';
  t.tags.forEach(tag => {
    const s = document.createElement('span');
    s.className = `res-tag ${t.tagClass}`;
    s.textContent = tag;
    tagsEl.appendChild(s);
  });

  const compEl = document.getElementById('res-compat');
  compEl.innerHTML = '';
  t.compat.forEach(name => {
    const s = document.createElement('span');
    s.className = `compat-chip ${t.chipClass}`;
    s.textContent = name;
    compEl.appendChild(s);
  });

  // Save to localStorage
  currentResultKey = saveResult(userName, t.name, key);
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').classList.remove('done');
  document.getElementById('submit-btn').textContent = '✓ 결과 제출하기';

  // Load stats
  loadStats(key);
}

/* ── Stats ── */
async function loadStats(myTypeKey) {
  let counts = { a:0, b:0, c:0, d:0 };
  let total = 0;

  if (CONFIG.statsUrl) {
    try {
      const res = await fetch(CONFIG.statsUrl);
      const json = await res.json();
      // n8n 응답 형식: { total: N, counts: { a, b, c, d } }
      counts = json.counts;
      total  = json.total;
    } catch {
      // fallback to localStorage
      const data = getStoredData();
      Object.values(data).forEach(e => { if (counts[e.typeKey] !== undefined) counts[e.typeKey]++; });
      total = Object.values(counts).reduce((s, n) => s + n, 0);
    }
  } else {
    const data = getStoredData();
    Object.values(data).forEach(e => { if (counts[e.typeKey] !== undefined) counts[e.typeKey]++; });
    total = Object.values(counts).reduce((s, n) => s + n, 0);
  }

  renderStats(counts, total, myTypeKey);
}

const BAR_COLORS = {
  a: '#f59e0b', b: '#10b981', c: '#8b5cf6', d: '#ec4899'
};

function renderStats(counts, total, myTypeKey) {
  document.getElementById('stats-total').textContent = `총 ${total}명 참여`;

  // Sort by count desc
  const sorted = Object.entries(TYPES)
    .map(([k, t]) => ({ key: k, name: t.name, count: counts[k] || 0 }))
    .sort((a, b) => b.count - a.count);

  const rowsEl = document.getElementById('stats-rows');
  rowsEl.innerHTML = '';

  sorted.forEach(item => {
    const pct = total > 0 ? Math.round((item.count / total) * 100) : 0;
    const isMe = item.key === myTypeKey;
    const row = document.createElement('div');
    row.className = 'stats-row' + (isMe ? ' mine' : '');
    row.innerHTML = `
      <span class="stats-label">
        ${item.name}${isMe ? '<span class="stats-mine-badge">나</span>' : ''}
      </span>
      <div class="stats-bar-wrap">
        <div class="stats-bar" style="width:0%;background:${BAR_COLORS[item.key]}" data-pct="${pct}"></div>
      </div>
      <span class="stats-pct">${pct}%</span>`;
    rowsEl.appendChild(row);
  });

  // Animate bars after paint
  requestAnimationFrame(() => {
    rowsEl.querySelectorAll('.stats-bar').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });
}

/* ── Data: localStorage ── */
function saveResult(name, typeName, typeKey) {
  const data = getStoredData();
  const key = Date.now().toString();
  data[key] = {
    name,
    typeName,
    typeKey,
    ts: new Date().toLocaleString('ko-KR', { hour12: false })
  };
  localStorage.setItem(CONFIG.storageKey, JSON.stringify(data));
  return key;
}

function getStoredData() {
  try { return JSON.parse(localStorage.getItem(CONFIG.storageKey) || '{}'); }
  catch { return {}; }
}

/* ── Submit (webhook) ── */
async function submitResult() {
  const btn = document.getElementById('submit-btn');
  const record = getStoredData()[currentResultKey];
  if (!record) return;

  if (CONFIG.webhookUrl) {
    btn.disabled = true;
    btn.textContent = '전송 중…';
    try {
      await fetch(CONFIG.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record)
      });
      btn.classList.add('done');
      btn.textContent = '✓ 제출 완료!';
    } catch {
      btn.disabled = false;
      btn.textContent = '⚠ 다시 시도하기';
    }
  } else {
    // No webhook: show saved confirmation
    btn.classList.add('done');
    btn.textContent = '✓ 저장 완료 (로컬)';
    btn.disabled = true;
  }
}

/* ── Admin: render ── */
function renderAdmin() {
  const data = getStoredData();
  const entries = Object.values(data);

  document.getElementById('admin-meta').textContent =
    `총 ${entries.length}명 응답`;

  // Type count stats
  const counts = { a:0, b:0, c:0, d:0 };
  entries.forEach(e => { if (counts[e.typeKey] !== undefined) counts[e.typeKey]++; });
  const colors = { a:'#fef3c7', b:'#d1fae5', c:'#ede9fe', d:'#fce7f3' };
  const statsEl = document.getElementById('admin-stats');
  statsEl.innerHTML = Object.entries(TYPES).map(([k,t]) =>
    `<div style="background:${colors[k]};border-radius:12px;padding:12px 14px">
       <div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:4px">${t.name}</div>
       <div style="font-size:22px;font-weight:900;color:#374151">${counts[k]}명</div>
     </div>`
  ).join('');

  // Table rows
  const tbody = document.getElementById('admin-tbody');
  if (entries.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="padding:20px;text-align:center;color:#9ca3af">아직 응답이 없습니다</td></tr>`;
    return;
  }
  tbody.innerHTML = entries.map((e, i) =>
    `<tr style="border-bottom:1px solid #f3f4f6">
       <td style="padding:10px 14px;color:#9ca3af;font-weight:600">${i+1}</td>
       <td style="padding:10px 14px;font-weight:700;color:#374151">${escHtml(e.name)}</td>
       <td style="padding:10px 14px;font-weight:600;color:#374151">${escHtml(e.typeName)}</td>
       <td style="padding:10px 14px;color:#6b7280;font-size:12px">${escHtml(e.ts)}</td>
     </tr>`
  ).join('');
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function exportCSV() {
  const data = getStoredData();
  const rows = [['이름','유형','시각']];
  Object.values(data).forEach(e => rows.push([e.name, e.typeName, e.ts]));
  const csv = '\uFEFF' + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'picnic_results.csv';
  a.click();
}

function clearData() {
  if (!confirm('수집된 응답을 모두 삭제할까요?')) return;
  localStorage.removeItem(CONFIG.storageKey);
  renderAdmin();
}

function restartQuiz() {
  vScore = [0, 0];
  eScore = [0, 0];
  cur = 0;
  userName = '';
  currentResultKey = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('user-name').value = '';
  document.getElementById('intro').style.display = 'block';
}
</script>
